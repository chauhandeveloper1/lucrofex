<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2FCC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BEFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BEFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0B2FCC" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Icon Box -->
  <rect x="0" y="8" width="64" height="64" rx="18" fill="url(#iconGrad)" filter="url(#shadow)"/>
  <!-- Inner glow ring -->
  <rect x="2" y="10" width="60" height="60" rx="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- LF Monogram -->
  <!-- L -->
  <text x="9" y="55" font-family="Georgia, serif" font-size="36" font-weight="700" fill="white" opacity="0.95" filter="url(#glow)">L</text>
  <!-- F overlapping slightly -->
  <text x="31" y="55" font-family="Georgia, serif" font-size="36" font-weight="700" fill="url(#goldGrad)" filter="url(#glow)">F</text>

  <!-- Gold accent dot -->
  <circle cx="57" cy="16" r="5" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Company Name -->
  <!-- Lucro -->
  <text x="78" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="white">Lucro</text>
  <!-- FeX in gold -->
  <text x="160" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="url(#goldGrad)">FeX</text>

  <!-- Tagline -->
  <text x="79" y="56" font-family="Arial, sans-serif" font-size="10" font-weight="400" letter-spacing="2.5" fill="rgba(255,255,255,0.4)" text-transform="uppercase">AUDIENCE MONETIZATION</text>

  <!-- Gold underline accent under LucroFeX -->
  <rect x="78" y="42" width="140" height="1.5" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
</svg>
